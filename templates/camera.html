<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantCure - Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'DM Sans', sans-serif;
        }
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 320px;
            aspect-ratio: 16 / 20;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            height: 140px;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
        }
        .btn-capture {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .btn-capture-inner {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #fff;
        }
        .btn-action {
            color: #fff;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px;
        }
        .overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 10;
        }
        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 20;
        }
        #preview-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            z-index: 30;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        #preview-img {
            width: 90%;
            max-width: 320px;
            aspect-ratio: 16 / 20;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid #10b981;
        }
        .back-btn {
           position: absolute;
           top: 20px;
           right: 20px;
           background: rgba(255,255,255,0.2);
           border: none;
           color: #fff;
           padding: 8px 16px;
           border-radius: 20px;
           cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-wrapper">
            <video id="video" autoplay muted playsinline></video>
            <div id="flash" class="flash"></div>
        </div>
        <div class="overlay">
            <h3 id="cam-status" style="font-size: 11px; color: #fff; background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-weight: 700;">● LIVE</h3>
        </div>
        <button class="back-btn" onclick="window.history.back()">Exit</button>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="switchCamera()">🔄 Flip</button>
        <button class="btn-capture" onclick="takePhoto()">
            <div class="btn-capture-inner"></div>
        </button>
        <button class="btn-action" onclick="window.history.back()">✕ Cancel</button>
    </div>

    <div id="preview-container">
        <img id="preview-img" src="" alt="Capture Preview">
        <div class="controls">
            <button class="btn-action" onclick="retake()">↺ Retake</button>
            <button class="btn-action" style="background: #10b981; padding: 12px 24px; border-radius: 8px;" onclick="upload()">Analyze Disease</button>
        </div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        let stream = null;
        let currentFacingMode = 'environment';
        let capturedBlob = null;
        let videoDevices = [];

        async function initCamera() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                let targetDeviceId = null;
                // Look for UltraViewer / Virtual cameras first
                for (const d of videoDevices) {
                    const label = d.label.toLowerCase();
                    if (label.includes('ultraviewer') || label.includes('remote') || label.includes('virtual')) {
                        targetDeviceId = d.deviceId;
                        document.getElementById('cam-status').textContent = '📱 REMOTE CAMERA';
                        document.getElementById('cam-status').style.background = '#10b981';
                        break;
                    }
                }

                await startCamera(targetDeviceId);
            } catch (e) {
                console.error("Init error", e);
                await startCamera(); // fallback
            }
        }

        async function startCamera(deviceId = null) {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
            }
            try {
                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: currentFacingMode },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('video').srcObject = stream;
            } catch (e) {
                if (deviceId) {
                    // If specific device fails, try generic
                    await startCamera();
                } else {
                    alert("Camera error: " + e.message);
                }
            }
        }

        async function switchCamera() {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await startCamera();
            document.getElementById('cam-status').textContent = '● LIVE';
            document.getElementById('cam-status').style.background = 'rgba(255,255,255,0.2)';
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const flash = document.getElementById('flash');

            // Flash effect
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 100);

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                capturedBlob = blob;
                document.getElementById('preview-img').src = URL.createObjectURL(blob);
                document.getElementById('preview-container').style.display = 'flex';
            }, 'image/jpeg', 0.9);
        }

        function retake() {
            document.getElementById('preview-container').style.display = 'none';
            capturedBlob = null;
        }

        async function upload() {
            if (!capturedBlob) return;
            
            const formData = new FormData();
            formData.append('image', capturedBlob, 'capture.jpg');
            
            const btn = event.target;
            btn.textContent = 'Analyzing...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('remoteDiagnosis', JSON.stringify(data));
                    window.location.href = '/dashboard?view=detect';
                } else {
                    alert("Analysis Failed: " + (data.message || data.error));
                    btn.textContent = 'Analyze Disease';
                    btn.disabled = false;
                }
            } catch (e) {
                alert("Network error. Please try again.");
                btn.textContent = 'Analyze Disease';
                btn.disabled = false;
            }
        }

        initCamera();
    </script>
</body>
</html>
